<!doctype html><html lang="ja"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RebarOS Chat</title><style>body{margin:0;background:#eef2f7;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,sans-serif}header{background:#08264a;color:white;padding:16px;position:sticky;top:0}.wrap{padding:12px}.card{background:white;border:1px solid #cbd5e1;border-radius:18px;padding:14px;margin:12px 0}.btn{border:0;border-radius:14px;padding:14px;width:100%;font-weight:900;color:white;background:#047857}.gray{background:#374151}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,textarea{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:12px;padding:12px;font-size:16px}textarea{min-height:70px}.chat{height:360px;overflow:auto;background:#f8fafc;border:1px solid #cbd5e1;border-radius:14px;padding:10px}.msg{padding:10px 12px;border-radius:14px;margin:8px 0;white-space:pre-wrap;line-height:1.45}.me{background:#dbeafe;margin-left:30px}.ai{background:white;border:1px solid #cbd5e1;margin-right:30px}.raw{background:#0b1020;color:#d1d5db;border-radius:14px;padding:12px;font:12px monospace;max-height:220px;overflow:auto}.sum{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.sum div{background:#ffffff22;border-radius:12px;padding:10px}.sum b{display:block;font-size:22px}.hint{color:#64748b}</style><body><header><h1>RebarOS Chat Takeoff</h1><p>図面を入れて、会話しながら鉄筋だけ拾います。JWW/DWGはDXFか画像に変換してください。</p><div class="sum"><div>重量<b id="kg">0.0kg</b></div><div>税別<b id="sub">0円</b></div><div>税込<b id="tax">0円</b></div></div></header><div class="wrap"><div class="card"><h2>図面/CAD</h2><input id="f" type="file" accept="image/*,.dxf"><div class="grid" style="margin-top:10px"><button class="btn" onclick="analyze()">解析</button><button class="btn gray" onclick="resetAll()">リセット</button></div><p id="st" class="hint">画像またはDXFを入れてください。</p></div><div class="card"><h2>チャット</h2><div id="chat" class="chat"><div class="msg ai">例：外周はD13、延長28000、主筋2本で加工帳へ。\n例：土間は9100×7280、D10@250で出して。</div></div><textarea id="q" placeholder="ここに指示を入力"></textarea><button class="btn" onclick="talk()" style="margin-top:8px">送信</button></div><div class="card"><h2>解析結果</h2><div id="out" class="raw">未解析</div></div></div><script>const $=id=>document.getElementById(id);let ctx={},file=null;$('f').onchange=e=>{file=e.target.files[0];$('st').textContent=file?file.name:'ファイル未選択'};function msg(t,c='ai'){let d=document.createElement('div');d.className='msg '+c;d.textContent=t;$('chat').appendChild(d);$('chat').scrollTop=$('chat').scrollHeight}async function analyze(){if(!file){$('st').textContent='ファイルを入れてください';return}let fd=new FormData(),url;if(file.name.toLowerCase().endsWith('.dxf')){fd.append('file',file,file.name);url='/api/analyze-dxf'}else{fd.append('image',file,'page.jpg');fd.append('page','1');url='/api/analyze-page'}$('st').textContent='解析中...';try{let r=await fetch(url,{method:'POST',body:fd});let j=await r.json();if(!r.ok)throw Error(j.error||r.status);ctx=j;$('out').textContent=JSON.stringify(j,null,2);$('st').textContent='解析完了';msg('解析しました。外周延長、内部延長、土間寸法、箇所数などをチャットで指示してください。')}catch(e){$('st').textContent='エラー: '+e.message;msg('解析エラー: '+e.message)}}async function talk(){let q=$('q').value.trim();if(!q)return;$('q').value='';msg(q,'me');try{let r=await fetch('/api/chat-takeoff',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:q,context:ctx})});let j=await r.json();if(!r.ok)throw Error(j.error||r.status);msg(j.reply||'返答なし')}catch(e){msg('チャットエラー: '+e.message)}}function resetAll(){ctx={};file=null;$('f').value='';$('out').textContent='未解析';$('st').textContent='リセットしました';msg('リセットしました')}</script></body></html>
