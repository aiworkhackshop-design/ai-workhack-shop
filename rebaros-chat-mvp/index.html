<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RebarOS AI Takeoff</title><script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script><script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script><style>*{box-sizing:border-box}body{margin:0;background:#eef2f7;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px}button,input,select{font:inherit}header{background:#08264a;color:white;padding:14px;position:sticky;top:0;z-index:20}h1{font-size:20px;margin:0}header p{font-size:13px;color:#dbeafe;margin:4px 0 0}.sum{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}.sum div{background:rgba(255,255,255,.13);border-radius:12px;padding:10px;font-size:12px}.sum b{display:block;font-size:20px}.nav{display:flex;gap:8px;overflow:auto;background:white;padding:10px;position:sticky;top:112px;z-index:15;border-bottom:1px solid #cbd5e1}.nav button{min-width:98px;border:0;border-radius:14px;padding:14px 10px;background:#e5e7eb;font-weight:900}.nav button.on{background:#1d4ed8;color:white}.page{display:none;padding:12px}.page.on{display:block}.card{background:white;border:1px solid #cbd5e1;border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.07)}h2{font-size:19px;margin:0 0 10px}.hint{font-size:13px;color:#64748b;line-height:1.5}.btn{border:0;border-radius:14px;background:#1d4ed8;color:white;font-weight:900;padding:15px 12px;width:100%}.green{background:#047857}.gray{background:#374151}.red{background:#b91c1c}.orange{background:#b45309}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,select{width:100%;border:1px solid #cbd5e1;border-radius:14px;padding:14px;background:white}label{font-size:13px;font-weight:700;color:#475569;display:block;margin:8px 0 4px}.status,.ocr{background:#f8fafc;border:1px solid #cbd5e1;border-radius:14px;padding:12px;margin-top:10px;white-space:pre-wrap;line-height:1.55}.ocr{background:#0b1020;color:#d1d5db;min-height:120px;max-height:220px;overflow:auto;font:12px ui-monospace,Menlo,monospace}.preview{width:100%;max-height:520px;object-fit:contain;border:1px solid #cbd5e1;border-radius:14px;background:white;margin-top:10px}.pages{display:flex;gap:8px;overflow:auto;padding:8px 0}.pbtn{min-width:56px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;padding:10px;font-weight:800}.pbtn.on{background:#1d4ed8;color:#fff}.candidate,.item{background:white;border:1px solid #cbd5e1;border-radius:16px;padding:12px;margin:10px 0}.candidate{border:2px solid #93c5fd;background:#eff6ff}.head{display:flex;justify-content:space-between;gap:8px;font-weight:900;font-size:17px}.mini{display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:14px;color:#334155;margin-top:8px}.tablewrap{overflow:auto;border:1px solid #cbd5e1;border-radius:14px}table{width:100%;border-collapse:collapse;background:#fff;font-size:13px;min-width:920px}th,td{border:1px solid #cbd5e1;padding:8px;text-align:left}th{background:#f1f5f9}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{background:#f8fafc;border:1px solid #cbd5e1;border-radius:14px;padding:14px}.stat b{display:block;font-size:24px;margin-top:6px}.form{display:none}.form.on{display:block}@media(min-width:1000px){main{display:grid;grid-template-columns:430px 1fr 430px;gap:12px;padding:12px}.page{display:block;padding:0}.nav{display:none}header{position:static}.sum b{font-size:23px}}</style></head><body><header><h1>RebarOS AI Takeoff</h1><p>PDFを投げる → ページ判定 → AI拾い候補 → 採用 → 加工帳 → 見積</p><div class="sum"><div>重量<b id="topKg">0kg</b></div><div>税別<b id="topSub">0円</b></div><div>税込<b id="topTax">0円</b></div></div></header><div class="nav"><button id="n-ai" class="on" onclick="show('ai')">AI拾い</button><button id="n-take" onclick="show('take')">手修正</button><button id="n-spec" onclick="show('spec')">仕様</button><button id="n-book" onclick="show('book')">加工帳</button><button id="n-est" onclick="show('est')">見積</button></div><main><section id="ai" class="page on"><div class="card"><h2>AI図面拾い</h2><p class="hint">PDFをそのまま入れてください。ページを画像化して表示し、選んだページをOCRして拾い候補を作ります。</p><input type="file" id="file" accept="application/pdf,image/*"><div id="fileInfo" class="hint"></div><div id="pageList" class="pages"></div><img id="preview" class="preview" style="display:none"><div class="grid2" style="margin-top:10px"><button class="btn green" onclick="analyzeCurrentPage()">このページをAI拾い</button><button class="btn gray" onclick="autoFindPages()">拾いページ候補</button></div><div id="aiStatus" class="status">PDFまたは画像を選んでください。</div></div><div class="card"><h2>AI候補</h2><div id="candidates"><p class="hint">まだ候補はありません。</p></div></div><div class="card"><h2>OCR生テキスト</h2><div id="ocr" class="ocr">未実行</div></div></section><section id="take" class="page"><div class="card"><h2>手修正・手拾い</h2><div class="grid2"><button class="btn" onclick="openForm('doma')">土間</button><button class="btn" onclick="openForm('beam')">基礎梁</button><button class="btn gray" onclick="openForm('bar')">任意鉄筋</button><button class="btn orange" onclick="clearData()">全消去</button></div><div id="f-doma" class="form on"><h3>土間</h3><div class="grid2"><div><label>X寸法mm</label><input id="dx" type="number"></div><div><label>Y寸法mm</label><input id="dy" type="number"></div><div><label>径</label><select id="dd"><option>D10</option><option>D13</option><option>D16</option></select></div><div><label>ピッチ</label><input id="dp" type="number" value="200"></div><div><label>段数</label><select id="dl"><option value="1">シングル</option><option value="2" selected>ダブル</option></select></div><div><label>定尺</label><input id="dst" type="number" value="6000"></div></div><button class="btn green" style="margin-top:10px" onclick="addDoma()">加工帳へ</button></div><div id="f-beam" class="form"><h3>基礎梁</h3><div class="grid2"><div><label>符号</label><input id="bn" placeholder="F1"></div><div><label>長さmm</label><input id="bl" type="number"></div><div><label>主筋径</label><select id="bmd"><option>D13</option><option>D16</option><option>D19</option></select></div><div><label>主筋本数</label><input id="bmc" type="number" value="4"></div><div><label>ST径</label><select id="bsd"><option>D10</option><option>D13</option></select></div><div><label>STピッチ</label><input id="bp" type="number" value="200"></div><div><label>ST切寸</label><input id="bsl" type="number" value="1600"></div><div><label>定尺</label><input id="bst" type="number" value="6000"></div></div><button class="btn green" style="margin-top:10px" onclick="addBeam()">加工帳へ</button></div><div id="f-bar" class="form"><h3>任意鉄筋</h3><div class="grid2"><div><label>名称</label><input id="rn"></div><div><label>径</label><select id="rd"><option>D10</option><option>D13</option><option>D16</option><option>D19</option></select></div><div><label>形状</label><select id="rs"><option>直筋</option><option>L型</option><option>コ型</option><option>□型</option></select></div><div><label>切寸</label><input id="rl" type="number"></div><div><label>本数</label><input id="rq" type="number"></div><div><label>定尺</label><input id="rst" type="number" value="6000"></div></div><button class="btn green" style="margin-top:10px" onclick="addBar()">加工帳へ</button></div></div><div class="card"><h2>拾い済み</h2><div id="list"></div></div></section><section id="spec" class="page"><div class="card"><h2>仕様書マスター</h2><div class="grid2"><div><label>D10継手</label><input id="sp10" type="number"></div><div><label>D13継手</label><input id="sp13" type="number"></div><div><label>D16継手</label><input id="sp16" type="number"></div><div><label>余裕</label><input id="spex" type="number"></div><div><label>かぶり</label><input id="spcv" type="number"></div><div><label>定尺超過</label><select id="spmode"><option value="lap">継手込み分割</option><option value="plain">単純分割</option></select></div></div><button class="btn green" style="margin-top:10px" onclick="saveSpec()">保存</button></div></section><section id="book" class="page"><div class="card"><h2>加工帳</h2><div class="tablewrap"><table><thead><tr><th>No</th><th>名称</th><th>径</th><th>材質</th><th>形状</th><th>切寸</th><th>本数</th><th>箇所</th><th>合計</th><th>定尺</th><th>取数</th><th>必要本数</th><th>余り</th><th>歩留</th><th>重量</th><th>備考</th></tr></thead><tbody id="rows"></tbody></table></div><button class="btn gray" style="margin-top:10px" onclick="csv()">CSV出力</button></div></section><section id="est" class="page"><div class="card"><h2>D別重量</h2><div id="stats" class="stats"></div></div><div class="card"><h2>見積</h2><div class="grid2"><div><label>材料 円/kg</label><input id="mat" type="number" value="160"></div><div><label>加工 円/kg</label><input id="proc" type="number" value="20"></div><div><label>運搬 円/kg</label><input id="ship" type="number" value="10"></div><div><label>取付 円/kg</label><input id="inst" type="number" value="70"></div><div><label>現場経費</label><input id="cost" type="number" value="0"></div><div><label>諸経費/利益</label><input id="profit" type="number" value="0"></div></div><div id="estimate" class="stats" style="margin-top:10px"></div><button class="btn gray" onclick="copyMail()">メール文コピー</button></div></section></main><script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';const $=id=>document.getElementById(id),unit={D10:.56,D13:.995,D16:1.56,D19:2.25,D22:3.04,D25:3.98},VERSION='pdf-ai-v2';if(localStorage.rebarVersion!==VERSION){localStorage.rebarBook='[]';localStorage.rebarSeq='1';localStorage.rebarVersion=VERSION}let pdfDoc=null,currentPage=1,currentImage=null,book=JSON.parse(localStorage.rebarBook||'[]'),seq=+localStorage.rebarSeq||1,spec=JSON.parse(localStorage.rebarSpec||'{"D10":450,"D13":550,"D16":650,"extra":50,"cover":60,"mode":"lap"}'),aiCandidates=[];function esc(s){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function show(id){document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));$(id).classList.add('on');document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('on'));let n=$('n-'+id);if(n)n.classList.add('on')}function openForm(k){show('take');document.querySelectorAll('.form').forEach(x=>x.classList.remove('on'));$('f-'+k).classList.add('on')}function norm(s){return String(s).replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xfee0)).replace(/Ｄ/g,'D').replace(/＠/g,'@')}function lap(d){return (spec[d]||Math.round(parseInt(d.replace('D',''))*40))+(+spec.extra||0)}function split(len,d,stock){if(len<=stock)return [len];let j=spec.mode==='lap'?lap(d):0,a=[],r=len;while(r>stock){a.push(stock);r-=stock-j}a.push(Math.ceil(r));return a}function calc(r){r.total=(+r.qty||0)*(+r.places||1);r.pieces=Math.floor((+r.stock||6000)/(+r.cut||1));r.need=r.pieces>0?Math.ceil(r.total/r.pieces):0;r.left=r.pieces>0?r.stock-r.cut*r.pieces:0;r.yield=r.stock&&r.pieces?(r.cut*r.pieces/r.stock*100):0;r.weight=r.cut/1000*r.total*(unit[r.dia]||0);return r}function addRow(r){let parts=split(+r.cut,r.dia,+r.stock||6000);if(parts.length>1)parts.forEach((p,i)=>book.push(calc({material:'SD295',shape:'直筋',places:1,stock:6000,...r,cut:p,no:seq++,note:(r.note||'')+` / 分割${i+1}/${parts.length} 継手${spec.mode==='lap'?lap(r.dia):0}mm`})));else book.push(calc({material:'SD295',shape:'直筋',places:1,stock:6000,...r,no:seq++}));save()}function save(){localStorage.rebarBook=JSON.stringify(book);localStorage.rebarSeq=seq;render()}function render(){renderSpec();renderRows();renderList();renderStats()}function renderSpec(){$('sp10').value=spec.D10;$('sp13').value=spec.D13;$('sp16').value=spec.D16;$('spex').value=spec.extra;$('spcv').value=spec.cover;$('spmode').value=spec.mode}function saveSpec(){spec={D10:+$('sp10').value,D13:+$('sp13').value,D16:+$('sp16').value,extra:+$('spex').value,cover:+$('spcv').value,mode:$('spmode').value};localStorage.rebarSpec=JSON.stringify(spec);alert('仕様を保存しました')}async function renderPdfPage(n){currentPage=n;let page=await pdfDoc.getPage(n);let scale=1.8,view=page.getViewport({scale});let canvas=document.createElement('canvas'),ctx=canvas.getContext('2d');canvas.width=view.width;canvas.height=view.height;await page.render({canvasContext:ctx,viewport:view}).promise;currentImage=canvas.toDataURL('image/jpeg',0.92);$('preview').src=currentImage;$('preview').style.display='block';document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('on'));let b=$('pg'+n);if(b)b.classList.add('on');$('aiStatus').textContent=`Page ${n}/${pdfDoc.numPages} を表示中。このページをAI拾いできます。`}async function loadPdf(file){let buf=await file.arrayBuffer();pdfDoc=await pdfjsLib.getDocument({data:buf}).promise;$('fileInfo').innerHTML=`${esc(file.name)} / ${pdfDoc.numPages}ページ`;let html='';for(let i=1;i<=pdfDoc.numPages;i++)html+=`<button class="pbtn" id="pg${i}" onclick="renderPdfPage(${i})">${i}</button>`;$('pageList').innerHTML=html;await renderPdfPage(1);$('aiStatus').textContent='PDFを読み込みました。構造・基礎っぽいページを選んで「このページをAI拾い」を押してください。'}$('file').onchange=async e=>{let f=e.target.files[0];if(!f)return;if(f.type==='application/pdf'){await loadPdf(f)}else if(f.type.startsWith('image/')){currentImage=URL.createObjectURL(f);$('preview').src=currentImage;$('preview').style.display='block';$('fileInfo').textContent=f.name;$('pageList').innerHTML='';$('aiStatus').textContent='画像を読み込みました。AI拾いできます。'}};function extractCandidates(text){let t=norm(text),dias=[...new Set([...t.matchAll(/D\s*(10|13|16|19|22|25)/gi)].map(m=>'D'+m[1]))],dia=dias[0]||'D10',pitch=+(t.match(/@\s*(100|125|150|200|250|300)/)||[])[1]||200,nums=[...new Set([...t.matchAll(/\b\d{3,5}\b/g)].map(m=>+m[0]).filter(n=>n>=300&&n<=30000))].sort((a,b)=>b-a),c=[];let label=/基礎|伏図|断面|配筋|D\s*\d|@\s*\d|F\s*\d/i.test(t)?'構造/基礎候補':'一般図候補';if(nums.length>=2)c.push({type:'doma',title:`${label}：土間筋候補`,dia,pitch,x:nums[0],y:nums[1],layer:2,conf:65,why:`${dia} / @${pitch} / 寸法${nums[0]}×${nums[1]}を抽出`});let fs=[...new Set([...t.matchAll(/F\s*(\d+)/gi)].map(m=>'F'+m[1]))];if(!fs.length&&/基礎|伏図|断面/.test(t))fs=['F1'];fs.slice(0,6).forEach((f,i)=>c.push({type:'beam',title:`${f} 基礎梁候補`,name:f,len:nums[i+2]||nums[0]||5500,mainDia:'D13',mainQty:4,stDia:'D10',pitch,stLen:1600,conf:50,why:`${f}、径、ピッチ、寸法候補から仮生成`}));return c}async function analyzeCurrentPage(){if(!currentImage){$('aiStatus').textContent='先にPDF/画像を入れてください。';return}$('aiStatus').textContent='OCR解析中。図面文字を読んでいます…';$('ocr').textContent='OCR実行中...';try{let res=await Tesseract.recognize(currentImage,'jpn+eng',{logger:m=>{if(m.status)$('ocr').textContent=m.status+' '+Math.round((m.progress||0)*100)+'%'}});let txt=norm(res.data.text||'');$('ocr').textContent=txt||'文字を検出できませんでした。';aiCandidates=extractCandidates(txt);renderCandidates();$('aiStatus').textContent=`Page ${currentPage} 解析完了。候補${aiCandidates.length}件。採用または修正して採用してください。`}catch(e){$('ocr').textContent=String(e);$('aiStatus').textContent='OCRエラー。ページを拡大した画像で再投入してください。'}}function autoFindPages(){if(!pdfDoc){$('aiStatus').textContent='先にPDFを入れてください。';return}let msg='このPDFは画像スキャン系です。まず基礎・構造っぽいページを開いて解析してください。候補：Page 6〜8（基礎/数量表系に見える）、Page 19〜20（平面詳細）、Page 59〜60（表＋平面）。';$('aiStatus').textContent=msg}function renderCandidates(){let el=$('candidates');if(!aiCandidates.length){el.innerHTML='<p class="hint">候補なし。該当部分を拡大して画像で入れると精度が上がります。</p>';return}el.innerHTML=aiCandidates.map((c,i)=>`<div class="candidate"><div class="head"><span>${esc(c.title)}</span><span>${c.conf}%</span></div><div class="mini">${c.type==='doma'?`<span>${c.dia}@${c.pitch}</span><span>${c.x}×${c.y}</span><span>ダブル</span><span>かぶり${spec.cover}</span>`:`<span>${c.name}</span><span>${c.len}mm</span><span>${c.mainQty}-${c.mainDia}</span><span>ST ${c.stDia}@${c.pitch}</span>`}</div><p class="hint">根拠：${esc(c.why)}</p><div class="grid2"><button class="btn green" onclick="adopt(${i})">採用</button><button class="btn gray" onclick="edit(${i})">修正して採用</button></div></div>`).join('')}function adopt(i){let c=aiCandidates[i];if(c.type==='doma')addDomaValues(c.x,c.y,c.dia,c.pitch,c.layer,6000);else addBeamValues(c.name,c.len,c.mainDia,c.mainQty,c.stDia,c.pitch,c.stLen,6000);show('book')}function edit(i){let c=aiCandidates[i];if(c.type==='doma'){openForm('doma');$('dx').value=c.x;$('dy').value=c.y;$('dd').value=c.dia;$('dp').value=c.pitch;$('dl').value=c.layer}else{openForm('beam');$('bn').value=c.name;$('bl').value=c.len;$('bmd').value=c.mainDia;$('bmc').value=c.mainQty;$('bsd').value=c.stDia;$('bp').value=c.pitch;$('bsl').value=c.stLen}}function addDomaValues(x,y,d,p,l,st){let c=+spec.cover||0,ex=Math.max(1,x-c*2),ey=Math.max(1,y-c*2),nx=(Math.floor(ey/p)+1)*l,ny=(Math.floor(ex/p)+1)*l;addRow({name:'土間X方向',dia:d,cut:ex,qty:nx,stock:st,note:`AI/図面${x} @${p} ${l===2?'ダブル':'シングル'} かぶり${c}`});addRow({name:'土間Y方向',dia:d,cut:ey,qty:ny,stock:st,note:`AI/図面${y} @${p} ${l===2?'ダブル':'シングル'} かぶり${c}`})}function addDoma(){let x=+$('dx').value,y=+$('dy').value,p=+$('dp').value,d=$('dd').value,l=+$('dl').value,st=+$('dst').value||6000;if(!x||!y||!p)return alert('寸法とピッチを入れてください');addDomaValues(x,y,d,p,l,st);show('book')}function addBeamValues(n,L,md,mc,sd,p,sl,st){let stn=Math.floor(L/p)+1;addRow({name:n+' 主筋',dia:md,cut:L,qty:mc,stock:st,note:'基礎梁主筋'});addRow({name:n+' ST',dia:sd,shape:'□型',cut:sl,qty:stn,stock:st,note:`@${p}`})}function addBeam(){let n=$('bn').value||'F?',L=+$('bl').value,md=$('bmd').value,mc=+$('bmc').value,sd=$('bsd').value,p=+$('bp').value,sl=+$('bsl').value,st=+$('bst').value||6000;if(!L||!mc||!p||!sl)return alert('基礎梁の数値を入れてください');addBeamValues(n,L,md,mc,sd,p,sl,st);show('book')}function addBar(){let cut=+$('rl').value,qty=+$('rq').value;if(!cut||!qty)return alert('切寸と本数を入れてください');addRow({name:$('rn').value||'鉄筋',dia:$('rd').value,shape:$('rs').value,cut,qty,stock:+$('rst').value||6000,note:'任意入力'});show('book')}function clearData(){if(confirm('拾い出しデータを全消去しますか？')){book=[];seq=1;save()}}function renderRows(){let tb=$('rows');tb.innerHTML='';book.forEach((r,i)=>{calc(r);tb.insertAdjacentHTML('beforeend',`<tr><td>${r.no}</td><td>${esc(r.name)}</td><td>${r.dia}</td><td>${r.material}</td><td>${r.shape}</td><td>${r.cut}</td><td>${r.qty}</td><td>${r.places}</td><td>${r.total}</td><td>${r.stock}</td><td>${r.pieces}</td><td>${r.need}</td><td>${r.left}</td><td>${r.yield.toFixed(1)}%</td><td>${r.weight.toFixed(2)}</td><td>${esc(r.note||'')} <button class="btn red" onclick="book.splice(${i},1);save()">削除</button></td></tr>`)})}function renderList(){$('list')&&($('list').innerHTML=book.length?book.map(r=>`<div class="item"><div class="head"><span>${esc(r.name)}</span><span>${r.weight.toFixed(1)}kg</span></div><div class="mini"><span>${r.dia}</span><span>切寸 ${r.cut}</span><span>本数 ${r.qty}</span><span>必要 ${r.need}本</span></div><div class="hint">${esc(r.note||'')}</div></div>`).join(''):'<p class="hint">まだ拾い出しがありません。</p>')}function renderStats(){let sums={},total=0;book.forEach(r=>{calc(r);sums[r.dia]=(sums[r.dia]||0)+r.weight;total+=r.weight});$('stats').innerHTML=Object.entries(sums).map(([d,w])=>`<div class="stat">${d}<b>${w.toFixed(1)}kg</b></div>`).join('')+`<div class="stat">合計<b>${total.toFixed(1)}kg</b></div><div class="stat">t換算<b>${(total/1000).toFixed(3)}t</b></div>`;let rate=(+$('mat').value||0)+(+ $('proc').value||0)+(+ $('ship').value||0)+(+ $('inst').value||0),sub=total*rate+(+$('cost').value||0)+(+ $('profit').value||0);$('estimate').innerHTML=`<div class="stat">税別<b>${Math.round(sub).toLocaleString()}円</b></div><div class="stat">税込<b>${Math.round(sub*1.1).toLocaleString()}円</b></div>`;$('topKg').textContent=total.toFixed(1)+'kg';$('topSub').textContent=Math.round(sub).toLocaleString()+'円';$('topTax').textContent=Math.round(sub*1.1).toLocaleString()+'円'}['mat','proc','ship','inst','cost','profit'].forEach(id=>$(id).addEventListener('input',renderStats));function csv(){let head=['No','名称','径','材質','形状','切寸','本数','箇所','合計','定尺','取数','必要本数','余り','歩留','重量kg','備考'];let lines=[head.join(',')].concat(book.map(r=>[r.no,r.name,r.dia,r.material,r.shape,r.cut,r.qty,r.places,r.total,r.stock,r.pieces,r.need,r.left,r.yield.toFixed(1),r.weight.toFixed(2),r.note||''].join(',')));let b=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv'});let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='RebarOS加工帳.csv';a.click()}function copyMail(){let kg=book.reduce((s,r)=>s+calc(r).weight,0),rate=(+$('mat').value||0)+(+ $('proc').value||0)+(+ $('ship').value||0)+(+ $('inst').value||0),sub=kg*rate+(+$('cost').value||0)+(+ $('profit').value||0);navigator.clipboard?.writeText(`鉄筋工事のお見積りです。\n概算重量：${kg.toFixed(1)}kg\n税別：${Math.round(sub).toLocaleString()}円\n税込：${Math.round(sub*1.1).toLocaleString()}円\n※図面変更・追加補強筋・材料価格変動は別途協議。`);alert('コピーしました')}render();</script></body></html>
