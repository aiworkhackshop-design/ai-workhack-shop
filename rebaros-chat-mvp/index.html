<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RebarOS Vision Takeoff</title><script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script><style>body{margin:0;background:#eef2f7;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}header{background:#08264a;color:#fff;padding:14px;position:sticky;top:0;z-index:10}h1{font-size:20px;margin:0}.sum{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}.sum div{background:rgba(255,255,255,.13);border-radius:12px;padding:10px;font-size:12px}.sum b{display:block;font-size:20px}.wrap{padding:12px}.card{background:#fff;border:1px solid #cbd5e1;border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 1px 6px #0001}.btn{border:0;border-radius:14px;background:#1d4ed8;color:#fff;font-weight:900;padding:15px 12px;width:100%;font-size:16px}.green{background:#047857}.gray{background:#374151}.red{background:#b91c1c}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}input{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:14px;padding:14px;background:#fff;font:inherit}.preview{width:100%;max-height:480px;object-fit:contain;border:1px solid #cbd5e1;border-radius:14px;background:#fff;margin-top:10px}.pages{display:flex;gap:8px;overflow:auto;padding:8px 0}.pbtn{min-width:54px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;padding:10px;font-weight:800}.pbtn.on{background:#1d4ed8;color:#fff}.status,.raw{background:#f8fafc;border:1px solid #cbd5e1;border-radius:14px;padding:12px;margin-top:10px;white-space:pre-wrap}.raw{background:#0b1020;color:#d1d5db;font:12px ui-monospace,Menlo,monospace;max-height:260px;overflow:auto}.item{border:1px solid #cbd5e1;border-radius:16px;padding:12px;margin:10px 0;background:#fff}.head{display:flex;justify-content:space-between;font-weight:900;font-size:17px}.mini{display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:14px;color:#334155;margin-top:8px}.bar{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:8px}.bar span{display:block;height:100%;background:#047857;width:0}.table{overflow:auto;border:1px solid #cbd5e1;border-radius:14px}table{width:100%;border-collapse:collapse;background:#fff;font-size:12px;min-width:1680px}th,td{border:1px solid #cbd5e1;padding:7px;white-space:nowrap}th{background:#f1f5f9}.hint{font-size:13px;color:#64748b;line-height:1.5}.toolbar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}</style></head><body><header><h1>RebarOS Vision Takeoff</h1><p>PDF全体をOpenAI Visionで読み、仕様書/基礎/土間/壁/梁を分類して鉄筋加工帳を作ります。</p><div class="sum"><div>重量<b id="kg">0kg</b></div><div>税別<b id="sub">0円</b></div><div>税込<b id="tax">0円</b></div></div></header><div class="wrap"><div class="card"><h2>PDFまるごとAI解析</h2><p class="hint">ページ画像をRenderサーバーの /api/analyze-page に送ります。AIには「拾い候補」と「鉄筋加工帳行」まで返させます。</p><input id="file" type="file" accept="application/pdf,image/*"><div id="info" class="hint"></div><div id="plist" class="pages"></div><img id="prev" class="preview" style="display:none"><div class="grid" style="margin-top:10px"><button class="btn green" onclick="scanAll()">全ページAI解析</button><button class="btn gray" onclick="scanOne()">表示ページだけ</button></div><div class="bar"><span id="prog"></span></div><div id="status" class="status">PDFを入れてください。</div></div><div class="card"><h2>ページ分類</h2><div id="pagesOut"><p class="hint">未解析です。</p></div></div><div class="card"><h2>拾い候補</h2><div id="cands"><p class="hint">まだ候補はありません。</p></div></div><div class="card" id="bookCard"><h2>鉄筋加工帳</h2><div class="toolbar"><button class="btn gray" onclick="csv()">加工帳CSV</button><button class="btn red" onclick="clearBook()">加工帳クリア</button></div><div class="table"><table><thead><tr><th>No</th><th>符号</th><th>部材</th><th>階</th><th>場所/通り</th><th>径</th><th>材質</th><th>形状</th><th>A</th><th>B</th><th>C</th><th>D</th><th>切寸</th><th>本数</th><th>箇所</th><th>合計</th><th>定尺</th><th>取数</th><th>必要本数</th><th>余り</th><th>単重</th><th>重量</th><th>加工</th><th>備考</th></tr></thead><tbody id="rows"></tbody></table></div></div><div class="card"><h2>AIレスポンス/エラー</h2><div id="raw" class="raw">未実行</div></div></div><script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';const $=id=>document.getElementById(id),unit={D10:.56,D13:.995,D16:1.56,D19:2.25,D22:3.04,D25:3.98};let pdf=null,cur=1,imgBlob=null,book=[],seq=1,pages=[],cands=[];function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}async function compressBlob(blob,maxW=1500,quality=.72){let url=URL.createObjectURL(blob),img=new Image();await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=url});let scale=Math.min(1,maxW/img.width),c=document.createElement('canvas'),x=c.getContext('2d');c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);x.fillStyle='#fff';x.fillRect(0,0,c.width,c.height);x.drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(url);return await new Promise(r=>c.toBlob(r,'image/jpeg',quality))}async function renderPage(n,show=true){cur=n;let page=await pdf.getPage(n),view=page.getViewport({scale:1.35}),c=document.createElement('canvas'),x=c.getContext('2d');c.width=view.width;c.height=view.height;await page.render({canvasContext:x,viewport:view}).promise;let blob=await new Promise(r=>c.toBlob(r,'image/jpeg',.75));blob=await compressBlob(blob,1500,.72);if(show){imgBlob=blob;$('prev').src=URL.createObjectURL(blob);$('prev').style.display='block';document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('on'));let b=$('pg'+n);if(b)b.classList.add('on');$('status').textContent=`Page ${n}/${pdf.numPages} 表示中 / 送信画像 ${(blob.size/1024).toFixed(0)}KB`;}return blob}async function loadPdf(f){let buf=await f.arrayBuffer();pdf=await pdfjsLib.getDocument({data:buf}).promise;$('info').innerHTML=`${esc(f.name)} / ${pdf.numPages}ページ`;let h='';for(let i=1;i<=pdf.numPages;i++)h+=`<button class="pbtn" id="pg${i}" onclick="renderPage(${i})">${i}</button>`;$('plist').innerHTML=h;await renderPage(1);$('status').textContent='PDF読み込み完了。表示ページだけ、または全ページAI解析を押してください。'}$('file').onchange=async e=>{let f=e.target.files[0];if(!f)return;if(f.type==='application/pdf')await loadPdf(f);else{imgBlob=await compressBlob(f,1500,.72);$('prev').src=URL.createObjectURL(imgBlob);$('prev').style.display='block';$('info').textContent=f.name+' / '+(imgBlob.size/1024).toFixed(0)+'KB'}};async function analyze(blob,page){let fd=new FormData();fd.append('image',blob,`page-${page}.jpg`);fd.append('page',String(page));let r=await fetch('/api/analyze-page',{method:'POST',body:fd});let txt=await r.text();let j;try{j=JSON.parse(txt)}catch(e){j={error:txt.slice(0,500)}};$('raw').textContent=JSON.stringify(j,null,2);if(!r.ok)throw new Error(j.error||('HTTP '+r.status));return j}function merge(j,page){(j.page_classification||[]).forEach(x=>pages.push({...x,page:x.page||page}));(j.takeoff_candidates||[]).forEach(x=>cands.push({...x,page:x.page||page}));(j.fabrication_book_rows||[]).forEach(x=>addFabRow(x,false));(j.takeoff_candidates||[]).forEach(c=>(c.fabrication_rows||[]).forEach(r=>addFabRow(r,false)));renderBook()}async function scanOne(){if(!imgBlob){$('status').textContent='先にPDF/画像を入れてください';return}pages=[];cands=[];$('status').textContent=`Page ${cur} をVision解析中...`;try{let j=await analyze(imgBlob,cur);merge(j,cur);renderPages();renderCands();renderStats();$('status').textContent=`解析完了。候補 ${cands.length}件 / 加工帳 ${book.length}行`}catch(e){pages=[{page:cur,type:'エラー',confidence:0,reason:e.message}];renderPages();$('status').textContent='エラー: '+e.message}}async function scanAll(){if(!pdf){$('status').textContent='先にPDFを入れてください';return}pages=[];cands=[];for(let p=1;p<=pdf.numPages;p++){ $('prog').style.width=Math.round((p-1)/pdf.numPages*100)+'%';$('status').textContent=`OpenAI Vision全ページ解析 ${p}/${pdf.numPages}`;try{let b=await renderPage(p,false),j=await analyze(b,p);merge(j,p)}catch(e){pages.push({page:p,type:'エラー',confidence:0,reason:e.message})}renderPages();renderCands();renderStats()}$('prog').style.width='100%';$('status').textContent=`完了。候補 ${cands.length}件 / 加工帳 ${book.length}行`}function renderPages(){let el=$('pagesOut');el.innerHTML=pages.map(r=>`<div class="item"><div class="head"><span>Page ${r.page}: ${esc(r.type)}</span><span>${r.confidence||0}%</span></div><p class="hint">${esc(r.reason||'')}</p><button class="btn gray" onclick="renderPage(${r.page})">このページを見る</button></div>`).join('')||'<p class="hint">未解析です。</p>'}function renderCands(){let el=$('cands');el.innerHTML=cands.map((c,i)=>`<div class="item"><div class="head"><span>P${c.page} ${esc(c.member||c.type)} ${esc(c.mark||c.name||'')}</span><span>${c.confidence||0}%</span></div><div class="mini"><span>${esc(c.dia||c.main||'')}</span><span>${esc(c.stirrup||('@'+(c.pitch||'')))}</span><span>${esc(c.location||'')}</span><span>${esc(c.shape||'')}</span></div><p class="hint">${esc(c.reason||'')}。加工帳行は下に生成されます。</p><div class="grid"><button class="btn green" onclick="adoptCandidate(${i})">加工帳へ</button><button class="btn red" onclick="cands.splice(${i},1);renderCands()">捨てる</button></div></div>`).join('')||'<p class="hint">候補なし。</p>'}function normalizeRow(r){let dia=r.dia||'D10',cut=+r.cut||+r.length||+r.a||0,qty=+r.qty||1,places=+r.places||1,total=+r.total_qty||qty*places,stock=+r.stock||6000,uw=+r.unit_weight||unit[dia]||0;let take=cut?Math.floor(stock/cut):0,need=take?Math.ceil(total/take):0,left=take?stock-cut*take:0,weight=cut/1000*total*uw;return {no:seq++,mark:r.mark||r.name||'',member:r.member||r.type||'',floor:r.floor||'',location:r.location||'',dia,material:r.material||'SD295',shape:r.shape||'直筋',a:+r.a||0,b:+r.b||0,c:+r.c||0,d:+r.d||0,cut,qty,places,total,stock,take,need,left,unit_weight:uw,weight,process:r.process||'切断',note:r.note||r.reason||'Vision候補'}}function addFabRow(r,doRender=true){let row=normalizeRow(r);if(row.cut<=0){row.note=(row.note||'')+' / 切寸未確定';}book.push(row);if(doRender){renderBook();renderStats();document.getElementById('bookCard').scrollIntoView({behavior:'smooth'});}}function adoptCandidate(i){let c=cands[i];if(c.fabrication_rows&&c.fabrication_rows.length){c.fabrication_rows.forEach(r=>addFabRow(r,false));}else{addFabRow({mark:c.mark||c.name,member:c.member||c.type,location:c.location,dia:c.dia||'D10',shape:c.shape||'直筋',cut:c.length||c.x||0,qty:c.qty||1,note:c.reason||'候補から生成'},false);}renderBook();renderStats();$('status').textContent='加工帳へ追加しました。';document.getElementById('bookCard').scrollIntoView({behavior:'smooth'});}function renderBook(){let tb=$('rows');tb.innerHTML='';book.forEach(r=>{tb.insertAdjacentHTML('beforeend',`<tr><td>${r.no}</td><td>${esc(r.mark)}</td><td>${esc(r.member)}</td><td>${esc(r.floor)}</td><td>${esc(r.location)}</td><td>${r.dia}</td><td>${r.material}</td><td>${esc(r.shape)}</td><td>${r.a}</td><td>${r.b}</td><td>${r.c}</td><td>${r.d}</td><td>${r.cut}</td><td>${r.qty}</td><td>${r.places}</td><td>${r.total}</td><td>${r.stock}</td><td>${r.take}</td><td>${r.need}</td><td>${r.left}</td><td>${r.unit_weight}</td><td>${r.weight.toFixed(2)}</td><td>${esc(r.process)}</td><td>${esc(r.note)}</td></tr>`)})}function renderStats(){let kg=book.reduce((s,r)=>s+(r.weight||0),0),sub=kg*260;$('kg').textContent=kg.toFixed(1)+'kg';$('sub').textContent=Math.round(sub).toLocaleString()+'円';$('tax').textContent=Math.round(sub*1.1).toLocaleString()+'円'}function clearBook(){book=[];seq=1;renderBook();renderStats()}function csv(){let head=['No','符号','部材','階','場所/通り','径','材質','形状','A','B','C','D','切寸','本数','箇所','合計','定尺','取数','必要本数','余り','単重','重量','加工','備考'];let lines=[head.join(',')].concat(book.map(r=>[r.no,r.mark,r.member,r.floor,r.location,r.dia,r.material,r.shape,r.a,r.b,r.c,r.d,r.cut,r.qty,r.places,r.total,r.stock,r.take,r.need,r.left,r.unit_weight,r.weight.toFixed(2),r.process,r.note].map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')));let b=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv'});let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='RebarOS鉄筋加工帳.csv';a.click()}</script></body></html>
