<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RebarOS Takeoff</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#eef2f7;color:#111827;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}header{background:#0f2a4d;color:#fff;padding:12px;position:sticky;top:0;z-index:10}h1{font-size:18px;margin:0}header p{margin:4px 0 0;color:#cbd5e1;font-size:12px}.top{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}.top div{background:rgba(255,255,255,.12);border-radius:10px;padding:8px;font-size:12px}.top b{display:block;font-size:17px;color:#fff}.tabs{display:flex;gap:6px;background:#fff;padding:8px;position:sticky;top:91px;z-index:9;border-bottom:1px solid #d1d5db}.tabs button{flex:1;background:#e5e7eb;color:#111;border:0;border-radius:10px;padding:10px;font-weight:700}.tabs button.active{background:#1d4ed8;color:#fff}.screen{display:none;padding:10px}.screen.active{display:block}.card{background:#fff;border:1px solid #d1d5db;border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 1px 5px rgba(0,0,0,.06)}input,select,button,textarea{font:inherit;border:1px solid #cbd5e1;border-radius:10px;padding:10px;background:#fff;width:100%}button{background:#1d4ed8;color:#fff;border:0;font-weight:800}.good{background:#047857}.bad{background:#b91c1c}.gray{background:#374151}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.small{font-size:12px;color:#6b7280}.preview{width:100%;max-height:520px;object-fit:contain;border:1px solid #cbd5e1;border-radius:12px;background:#fff}.chat{height:260px;overflow:auto;background:#f8fafc;border:1px solid #d1d5db;border-radius:12px;padding:10px}.msg{padding:10px;border-radius:12px;margin:8px 0;white-space:pre-wrap;line-height:1.45}.ai{background:#fff;border:1px solid #d1d5db;margin-right:20px}.user{background:#dbeafe;margin-left:20px}.cmd{display:flex;gap:8px;margin-top:8px}.cmd input{flex:1}.item{border:1px solid #d1d5db;border-radius:12px;background:#fff;padding:10px;margin:8px 0}.item h3{margin:0 0 6px;font-size:15px;display:flex;justify-content:space-between}.grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:13px}.k{color:#6b7280}.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stats div{background:#f8fafc;border:1px solid #d1d5db;border-radius:12px;padding:10px}.big{font-weight:900;font-size:20px}.scroll{overflow:auto}table{width:100%;border-collapse:collapse;background:#fff;font-size:12px}th,td{border:1px solid #cbd5e1;padding:6px;text-align:left}th{background:#f3f4f6}.fixed{position:fixed;right:14px;bottom:14px;border-radius:999px;width:auto;padding:14px 18px;background:#047857;box-shadow:0 5px 15px rgba(0,0,0,.25)}@media(min-width:1050px){.tabs{display:none}main{display:grid;grid-template-columns:360px 1fr 430px;gap:10px;padding:10px}.screen{display:block;padding:0}.chat{height:400px}.preview{max-height:720px}.fixed{display:none}}
</style>
</head>
<body>
<header><h1>RebarOS Takeoff</h1><p>図面 → 拾い出し → 加工帳 → 重量集計 → 見積</p><div class="top"><div>合計重量<b id="headKg">0kg</b></div><div>見積税別<b id="headSub">0円</b></div><div>税込<b id="headTax">0円</b></div></div></header>
<div class="tabs"><button class="active" onclick="tab(event,'chat')">チャット</button><button onclick="tab(event,'draw')">図面</button><button onclick="tab(event,'input')">拾い</button><button onclick="tab(event,'book')">加工帳</button><button onclick="tab(event,'sum')">見積</button></div>
<main>
<section id="draw" class="screen"><div class="card"><b>図面アップロード</b><p class="small">基礎伏図・基礎リスト・断面詳細の画像/PDFを貼る。まずは画像表示と手拾い入力を確実に動かします。</p><input type="file" id="file" accept="image/*,.pdf" multiple><img id="preview" class="preview" style="display:none"><div id="fileList" class="small"></div></div><div class="card"><b>番振りメモ</b><p class="small">図面を見ながらNoを作り、下の拾い入力で加工帳に変換します。</p><div class="row"><input id="markNo" placeholder="No 例: 1"><input id="markMemo" placeholder="メモ 例: 土間"><button onclick="addMark()">番振りメモ追加</button></div><div id="marks"></div></div></section>
<section id="chat" class="screen active"><div class="card"><div id="chatbox" class="chat"></div><div class="cmd"><input id="msg" placeholder="例：土間D10@200ダブル 15700 8950 / F1 5500 4-D13 ST D10@200 1600"><button onclick="send()">送信</button></div></div><div class="card"><b>すぐ拾う</b><div class="row"><button onclick="showDoma()">土間を拾う</button><button onclick="showBeam()">基礎梁を拾う</button><button onclick="showBar()">任意鉄筋</button><button class="gray" onclick="sample()">サンプル</button></div></div></section>
<section id="input" class="screen"><div class="card"><b>拾い入力</b><div id="formArea"></div></div><div class="card"><b>拾い出し一覧</b><div id="takeList"></div></div></section>
<section id="book" class="screen"><div class="card"><b>加工帳</b><p class="small">拾い入力から自動生成。定尺・取数・必要本数・余り・重量まで計算。</p><div class="scroll"><table><thead><tr><th>No</th><th>名称</th><th>径</th><th>材質</th><th>形状</th><th>切寸</th><th>本数</th><th>箇所</th><th>合計</th><th>定尺</th><th>取数</th><th>必要本数</th><th>余り</th><th>歩留</th><th>重量</th><th>備考</th></tr></thead><tbody id="bookRows"></tbody></table></div><button class="gray" onclick="csv()" style="margin-top:8px">加工帳CSV出力</button></div></section>
<section id="sum" class="screen"><div class="card"><b>D別重量集計</b><div id="stats" class="stats"></div></div><div class="card"><b>見積単価</b><div class="row"><input id="mat" type="number" value="160" placeholder="材料"><input id="proc" type="number" value="20" placeholder="加工"><input id="ship" type="number" value="10" placeholder="運搬"><input id="inst" type="number" value="70" placeholder="取付"><input id="cost" type="number" value="0" placeholder="現場経費"><input id="profit" type="number" value="0" placeholder="利益/諸経費"></div><p class="small">円/kg：材料・加工・運搬・取付。経費と利益は一式。</p><div id="estimate" class="stats"></div><button class="gray" onclick="copyMail()" style="margin-top:8px">見積メール文コピー</button></div></section>
</main><button class="fixed" onclick="showDoma()">＋拾い</button>
<script>
const $=id=>document.getElementById(id);const unit={D10:.56,D13:.995,D16:1.56,D19:2.25,D22:3.04,D25:3.98};let marks=JSON.parse(localStorage.rebarMarks||'[]'),book=JSON.parse(localStorage.rebarBook||'[]'),seq=Number(localStorage.rebarSeq||1);
function esc(s){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function tab(e,id){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));if(e)e.target.classList.add('active')}function ai(t){$('chatbox').insertAdjacentHTML('beforeend','<div class="msg ai">'+esc(t)+'</div>');$('chatbox').scrollTop=99999}function user(t){$('chatbox').insertAdjacentHTML('beforeend','<div class="msg user">'+esc(t)+'</div>');$('chatbox').scrollTop=99999}
function recalc(r){r.total=(+r.qty||0)*(+r.places||1);r.pieces=Math.floor((+r.stock||0)/(+r.cut||1));r.need=r.pieces>0?Math.ceil(r.total/r.pieces):0;r.left=r.pieces>0?r.stock-r.cut*r.pieces:0;r.yield=r.stock&&r.pieces?((r.cut*r.pieces/r.stock)*100):0;r.unit=unit[r.dia]||0;r.weight=(r.cut/1000)*r.total*r.unit;return r}function addRow(r){book.push(recalc({material:'SD295',shape:'直筋',places:1,stock:6000,...r,no:r.no||seq++}));save();}
function save(){localStorage.rebarBook=JSON.stringify(book);localStorage.rebarMarks=JSON.stringify(marks);localStorage.rebarSeq=seq;render()}
$('file').onchange=e=>{let files=[...e.target.files];$('fileList').innerHTML=files.map(f=>'・'+esc(f.name)).join('<br>');let f=files.find(x=>x.type.startsWith('image/'));if(f){$('preview').src=URL.createObjectURL(f);$('preview').style.display='block'}ai('図面を受け取りました。土間・基礎梁・任意鉄筋として拾って加工帳を作れます。')};
function addMark(){marks.push({no:$('markNo').value||marks.length+1,memo:$('markMemo').value||''});$('markNo').value='';$('markMemo').value='';save()}
function renderMarks(){$('marks').innerHTML=marks.map((m,i)=>`<div class="item"><b>No.${esc(m.no)}</b> ${esc(m.memo)} <button class="bad" onclick="marks.splice(${i},1);save()">削除</button></div>`).join('')}
function showDoma(){tab(null,'input');$('formArea').innerHTML='<h3>土間筋 → 加工帳</h3><div class="row"><input id="dx" type="number" placeholder="X方向切寸 mm"><input id="dy" type="number" placeholder="Y方向切寸 mm"><select id="dd"><option>D10</option><option>D13</option><option>D16</option></select><input id="dp" type="number" value="200" placeholder="ピッチ mm"><select id="layer"><option value="1">シングル</option><option value="2" selected>ダブル</option></select><input id="stock" type="number" value="6000" placeholder="定尺"><button class="good" onclick="addDoma()">加工帳に追加</button></div><p class="small">X方向筋本数=(Y寸法÷ピッチ+1)×段数、Y方向筋本数=(X寸法÷ピッチ+1)×段数</p>'}
function addDoma(){let x=+$('dx').value,y=+$('dy').value,p=+$('dp').value,l=+$('layer').value,d=$('dd').value,st=+$('stock').value||6000;if(!x||!y||!p)return ai('X寸法、Y寸法、ピッチを入れてください。');let nx=(Math.floor(y/p)+1)*l,ny=(Math.floor(x/p)+1)*l;addRow({name:'土間X方向',dia:d,cut:x,qty:nx,stock:st,note:`@${p} ${l===2?'ダブル':'シングル'}`});addRow({name:'土間Y方向',dia:d,cut:y,qty:ny,stock:st,note:`@${p} ${l===2?'ダブル':'シングル'}`});ai(`土間を加工帳に追加しました。\n${d} L=${x} ${nx}本 / L=${y} ${ny}本`)}
function showBeam(){tab(null,'input');$('formArea').innerHTML='<h3>基礎梁 → 加工帳</h3><div class="row"><input id="fname" placeholder="符号 F1"><input id="fl" type="number" placeholder="延長/切寸 mm"><select id="md"><option>D13</option><option>D16</option><option>D19</option></select><input id="mc" type="number" value="4" placeholder="主筋本数"><select id="sd"><option>D10</option><option>D13</option></select><input id="pitch" type="number" value="200" placeholder="STピッチ mm"><input id="stlen" type="number" value="1600" placeholder="ST切寸 mm"><input id="stock2" type="number" value="6000" placeholder="定尺"><button class="good" onclick="addBeam()">加工帳に追加</button></div>'}
function addBeam(){let n=$('fname').value||'F?',L=+$('fl').value,md=$('md').value,mc=+$('mc').value,sd=$('sd').value,p=+$('pitch').value,sl=+$('stlen').value,st=+$('stock2').value||6000;if(!L||!mc||!p||!sl)return ai('基礎梁の延長、主筋本数、STピッチ、ST切寸を入れてください。');let stn=Math.floor(L/p)+1;addRow({name:n+' 主筋',dia:md,cut:L,qty:mc,stock:st,note:'基礎梁主筋'});addRow({name:n+' ST',dia:sd,shape:'□型',cut:sl,qty:stn,stock:st,note:`@${p}`});ai(`${n}を加工帳に追加しました。\n主筋 ${md} L=${L} ${mc}本\nST ${sd} L=${sl} ${stn}本`)}
function showBar(){tab(null,'input');$('formArea').innerHTML='<h3>任意鉄筋 → 加工帳</h3><div class="row"><input id="rname" placeholder="名称"><select id="rd"><option>D10</option><option>D13</option><option>D16</option><option>D19</option><option>D22</option><option>D25</option></select><select id="shape"><option>直筋</option><option>L型</option><option>コ型</option><option>□型</option><option>フック</option></select><input id="rcut" type="number" placeholder="切寸 mm"><input id="rqty" type="number" placeholder="本数"><input id="rpl" type="number" value="1" placeholder="箇所"><input id="rst" type="number" value="6000" placeholder="定尺"><button class="good" onclick="addBar()">加工帳に追加</button></div>'}
function addBar(){let name=$('rname').value||'鉄筋',dia=$('rd').value,shape=$('shape').value,cut=+$('rcut').value,qty=+$('rqty').value,places=+$('rpl').value||1,stock=+$('rst').value||6000;if(!cut||!qty)return ai('切寸と本数を入れてください。');addRow({name,dia,shape,cut,qty,places,stock,note:'任意入力'});ai(`${name}を加工帳に追加しました。${dia} L=${cut} ${qty}本`)}
function parseMsg(m){let t=m.replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xfee0)).replace(/Ｄ/g,'D').replace(/＠/g,'@');if(/土間/.test(t)){let dia=(t.match(/D(10|13|16|19|22|25)/)||[])[0]||'D10';let p=+(t.match(/@\s*(\d+)/)||[])[1]||200;let nums=[...t.matchAll(/\b\d{4,5}\b/g)].map(x=>+x[0]);if(nums.length>=2){let x=nums[0],y=nums[1],l=/ダブル/.test(t)?2:1;let nx=(Math.floor(y/p)+1)*l,ny=(Math.floor(x/p)+1)*l;addRow({name:'土間X方向',dia,cut:x,qty:nx,note:`@${p} ${l===2?'ダブル':'シングル'}`});addRow({name:'土間Y方向',dia,cut:y,qty:ny,note:`@${p} ${l===2?'ダブル':'シングル'}`});ai(`土間を加工帳化しました。${dia} L=${x} ${nx}本 / L=${y} ${ny}本`);return true}}let f=(t.match(/F\s*\d+/i)||[])[0];if(f){let nums=[...t.matchAll(/\b\d{3,5}\b/g)].map(x=>+x[0]);let L=nums[0];let main=(t.match(/(\d+)\s*-\s*D(10|13|16|19|22|25)/)||[]);let pitch=+(t.match(/@\s*(\d+)/)||[])[1]||200;let stDia=(t.match(/ST\s*D(10|13|16|19|22|25)/i)||[])[1];let stLen=nums[1]||1600;if(L&&main.length){let cnt=+main[1],dia='D'+main[2],sd=stDia?'D'+stDia:'D10',stn=Math.floor(L/pitch)+1;addRow({name:f+' 主筋',dia,cut:L,qty:cnt,note:'基礎梁主筋'});addRow({name:f+' ST',dia:sd,shape:'□型',cut:stLen,qty:stn,note:`@${pitch}`});ai(`${f}を加工帳化しました。主筋 ${dia} L=${L} ${cnt}本 / ST ${sd} L=${stLen} ${stn}本`);return true}}return false}
function send(){let m=$('msg').value.trim();if(!m)return;user(m);$('msg').value='';if(/材料/.test(m)){let ns=[...m.matchAll(/\d+/g)].map(x=>+x[0]);if(ns.length>=4){$('mat').value=ns[0];$('proc').value=ns[1];$('ship').value=ns[2];$('inst').value=ns[3];render();ai('単価を反映しました。')}return}if(!parseMsg(m))ai('拾い方の例：\n土間D10@200ダブル 15700 8950\nF1 5500 4-D13 ST D10@200 1600\nまたは「土間を拾う」「基礎梁を拾う」ボタンを使ってください。')}
function render(){renderMarks();renderBook();renderStats();renderList()}function renderMarks(){$('marks').innerHTML=marks.map((m,i)=>`<div class="item"><b>No.${esc(m.no)}</b> ${esc(m.memo)} <button class="bad" onclick="marks.splice(${i},1);save()">削除</button></div>`).join('')}
function renderBook(){let tb=$('bookRows');tb.innerHTML='';book.forEach((r,i)=>{recalc(r);tb.insertAdjacentHTML('beforeend',`<tr><td>${r.no}</td><td>${esc(r.name)}</td><td>${r.dia}</td><td>${r.material}</td><td>${r.shape}</td><td>${r.cut}</td><td>${r.qty}</td><td>${r.places}</td><td>${r.total}</td><td>${r.stock}</td><td>${r.pieces}</td><td>${r.need}</td><td>${r.left}</td><td>${r.yield.toFixed(1)}%</td><td>${r.weight.toFixed(2)}</td><td>${esc(r.note||'')} <button class="bad" onclick="book.splice(${i},1);save()">削除</button></td></tr>`)})}
function renderList(){$('takeList').innerHTML=book.map((r,i)=>`<div class="item"><h3>${esc(r.name)} <span>${r.weight.toFixed(1)}kg</span></h3><div class="grid"><span><span class="k">径</span> ${r.dia}</span><span><span class="k">形状</span> ${r.shape}</span><span><span class="k">切寸</span> ${r.cut}</span><span><span class="k">本数</span> ${r.qty}</span><span><span class="k">定尺</span> ${r.stock}</span><span><span class="k">必要</span> ${r.need}本</span></div></div>`).join('')}
function renderStats(){let sums={},total=0;book.forEach(r=>{recalc(r);sums[r.dia]=(sums[r.dia]||0)+r.weight;total+=r.weight});$('stats').innerHTML=Object.entries(sums).map(([d,w])=>`<div>${d}<div class="big">${w.toFixed(1)}kg</div></div>`).join('')+`<div>合計<div class="big">${total.toFixed(1)}kg</div></div><div>t換算<div class="big">${(total/1000).toFixed(3)}t</div></div>`;let rate=(+$('mat').value||0)+(+ $('proc').value||0)+(+ $('ship').value||0)+(+ $('inst').value||0);let sub=total*rate+(+$('cost').value||0)+(+ $('profit').value||0);$('estimate').innerHTML=`<div>税別<div class="big">${Math.round(sub).toLocaleString()}円</div></div><div>税込<div class="big">${Math.round(sub*1.1).toLocaleString()}円</div></div>`;$('headKg').textContent=total.toFixed(1)+'kg';$('headSub').textContent=Math.round(sub).toLocaleString()+'円';$('headTax').textContent=Math.round(sub*1.1).toLocaleString()+'円'}
['mat','proc','ship','inst','cost','profit'].forEach(id=>$(id).addEventListener('input',render));function sample(){addRow({name:'土間X方向',dia:'D10',cut:15700,qty:92,note:'@200ダブル'});addRow({name:'土間Y方向',dia:'D10',cut:8950,qty:160,note:'@200ダブル'});addRow({name:'F1 主筋',dia:'D13',cut:5500,qty:4,note:'基礎梁'});addRow({name:'F1 ST',dia:'D10',shape:'□型',cut:1600,qty:29,note:'@200'});ai('サンプルを加工帳に追加しました。')}
function csv(){let head=['No','名称','径','材質','形状','切寸','本数','箇所','合計','定尺','取数','必要本数','余り','歩留','重量kg','備考'];let lines=[head.join(',')].concat(book.map(r=>[r.no,r.name,r.dia,r.material,r.shape,r.cut,r.qty,r.places,r.total,r.stock,r.pieces,r.need,r.left,r.yield.toFixed(1),r.weight.toFixed(2),r.note||''].join(',')));let b=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv'});let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='RebarOS加工帳.csv';a.click()}function copyMail(){let kg=book.reduce((s,r)=>s+recalc(r).weight,0);let rate=(+$('mat').value||0)+(+ $('proc').value||0)+(+ $('ship').value||0)+(+ $('inst').value||0);let sub=kg*rate+(+$('cost').value||0)+(+ $('profit').value||0);let txt=`鉄筋工事のお見積りを下記の通りご提示いたします。\n\n概算重量：${kg.toFixed(1)}kg\n税別金額：${Math.round(sub).toLocaleString()}円\n税込金額：${Math.round(sub*1.1).toLocaleString()}円\n\n※図面・施工範囲変更、材料価格変動、追加補強筋等は別途協議とさせていただきます。`;navigator.clipboard?.writeText(txt);ai('見積メール文をコピーしました。')}
ai('RebarOSを図面拾い出し用に作り直しました。\n例：土間D10@200ダブル 15700 8950\n例：F1 5500 4-D13 ST D10@200 1600');render();
</script>
</body></html>
