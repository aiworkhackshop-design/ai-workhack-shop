<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RebarOS Vision Takeoff</title><script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script><style>body{margin:0;background:#eef2f7;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}header{background:#08264a;color:white;padding:14px;position:sticky;top:0;z-index:10}h1{font-size:20px;margin:0}.sum{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}.sum div{background:rgba(255,255,255,.13);border-radius:12px;padding:10px;font-size:12px}.sum b{display:block;font-size:20px}.wrap{padding:12px}.card{background:#fff;border:1px solid #cbd5e1;border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 1px 6px #0001}.btn{border:0;border-radius:14px;background:#1d4ed8;color:#fff;font-weight:900;padding:15px 12px;width:100%;font-size:16px}.green{background:#047857}.gray{background:#374151}.red{background:#b91c1c}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,select{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:14px;padding:14px;background:#fff;font:inherit}label{font-size:13px;font-weight:700;color:#475569;display:block;margin:8px 0 4px}.preview{width:100%;max-height:480px;object-fit:contain;border:1px solid #cbd5e1;border-radius:14px;background:#fff;margin-top:10px}.pages{display:flex;gap:8px;overflow:auto;padding:8px 0}.pbtn{min-width:54px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;padding:10px;font-weight:800}.pbtn.on{background:#1d4ed8;color:#fff}.status,.raw{background:#f8fafc;border:1px solid #cbd5e1;border-radius:14px;padding:12px;margin-top:10px;white-space:pre-wrap}.raw{background:#0b1020;color:#d1d5db;font:12px ui-monospace,Menlo,monospace;max-height:260px;overflow:auto}.item{border:1px solid #cbd5e1;border-radius:16px;padding:12px;margin:10px 0;background:#fff}.head{display:flex;justify-content:space-between;font-weight:900;font-size:17px}.mini{display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:14px;color:#334155;margin-top:8px}.bar{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:8px}.bar span{display:block;height:100%;background:#047857;width:0}.table{overflow:auto;border:1px solid #cbd5e1;border-radius:14px}table{width:100%;border-collapse:collapse;background:#fff;font-size:13px;min-width:760px}th,td{border:1px solid #cbd5e1;padding:8px}th{background:#f1f5f9}.hint{font-size:13px;color:#64748b;line-height:1.5}</style></head><body><header><h1>RebarOS Vision Takeoff</h1><p>PDF全体をOpenAI Visionで読み、仕様書/基礎/土間/壁/梁を分類して拾い候補を出します。</p><div class="sum"><div>重量<b id="kg">0kg</b></div><div>税別<b id="sub">0円</b></div><div>税込<b id="tax">0円</b></div></div></header><div class="wrap"><div class="card"><h2>PDFまるごとAI解析</h2><p class="hint">ブラウザOCRは使いません。ページ画像をRenderサーバーの /api/analyze-page に送ってOpenAI Visionで解析します。</p><input id="file" type="file" accept="application/pdf,image/*"><div id="info" class="hint"></div><div id="plist" class="pages"></div><img id="prev" class="preview" style="display:none"><div class="grid" style="margin-top:10px"><button class="btn green" onclick="scanAll()">全ページAI解析</button><button class="btn gray" onclick="scanOne()">表示ページだけ</button></div><div class="bar"><span id="prog"></span></div><div id="status" class="status">PDFを入れてください。</div></div><div class="card"><h2>ページ分類</h2><div id="pagesOut"><p class="hint">未解析です。</p></div></div><div class="card"><h2>拾い候補</h2><div id="cands"><p class="hint">まだ候補はありません。</p></div></div><div class="card"><h2>加工帳</h2><div class="table"><table><thead><tr><th>No</th><th>名称</th><th>径</th><th>切寸</th><th>本数</th><th>重量</th><th>備考</th></tr></thead><tbody id="rows"></tbody></table></div></div><div class="card"><h2>AIレスポンス</h2><div id="raw" class="raw">未実行</div></div></div><script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';const $=id=>document.getElementById(id),unit={D10:.56,D13:.995,D16:1.56,D19:2.25,D22:3.04,D25:3.98};let pdf=null,cur=1,imgBlob=null,book=[],seq=1,pages=[],cands=[];function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}async function renderPage(n,show=true){cur=n;let page=await pdf.getPage(n),view=page.getViewport({scale:2}),c=document.createElement('canvas'),x=c.getContext('2d');c.width=view.width;c.height=view.height;await page.render({canvasContext:x,viewport:view}).promise;let blob=await new Promise(r=>c.toBlob(r,'image/jpeg',.9));if(show){imgBlob=blob;$('prev').src=URL.createObjectURL(blob);$('prev').style.display='block';document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('on'));let b=$('pg'+n);if(b)b.classList.add('on');$('status').textContent=`Page ${n}/${pdf.numPages} 表示中`;}return blob}async function loadPdf(f){let buf=await f.arrayBuffer();pdf=await pdfjsLib.getDocument({data:buf}).promise;$('info').innerHTML=`${esc(f.name)} / ${pdf.numPages}ページ`;let h='';for(let i=1;i<=pdf.numPages;i++)h+=`<button class="pbtn" id="pg${i}" onclick="renderPage(${i})">${i}</button>`;$('plist').innerHTML=h;await renderPage(1);$('status').textContent='PDF読み込み完了。全ページAI解析を押してください。'}$('file').onchange=async e=>{let f=e.target.files[0];if(!f)return;if(f.type==='application/pdf')await loadPdf(f);else{imgBlob=f;$('prev').src=URL.createObjectURL(f);$('prev').style.display='block';$('info').textContent=f.name}};async function analyze(blob,page){let fd=new FormData();fd.append('image',blob,`page-${page}.jpg`);fd.append('page',String(page));let r=await fetch('/api/analyze-page',{method:'POST',body:fd});let j=await r.json();if(!r.ok)throw new Error(j.error||'API error');return j}function merge(j,page){$('raw').textContent=JSON.stringify(j,null,2);(j.page_classification||[]).forEach(x=>pages.push({...x,page:x.page||page}));(j.takeoff_candidates||[]).forEach(x=>cands.push({...x,page:x.page||page}))}async function scanOne(){if(!imgBlob){$('status').textContent='先にPDF/画像を入れてください';return}pages=[];cands=[];$('status').textContent=`Page ${cur} をVision解析中...`;try{let j=await analyze(imgBlob,cur);merge(j,cur);renderPages();renderCands();$('status').textContent=`解析完了。候補 ${cands.length}件`}catch(e){$('status').textContent='エラー: '+e.message}}async function scanAll(){if(!pdf){$('status').textContent='先にPDFを入れてください';return}pages=[];cands=[];for(let p=1;p<=pdf.numPages;p++){ $('prog').style.width=Math.round((p-1)/pdf.numPages*100)+'%';$('status').textContent=`OpenAI Vision全ページ解析 ${p}/${pdf.numPages}`;try{let b=await renderPage(p,false),j=await analyze(b,p);merge(j,p)}catch(e){pages.push({page:p,type:'エラー',confidence:0,reason:e.message})}renderPages();renderCands()}$('prog').style.width='100%';$('status').textContent=`完了。候補 ${cands.length}件`}function renderPages(){let el=$('pagesOut');el.innerHTML=pages.map(r=>`<div class="item"><div class="head"><span>Page ${r.page}: ${esc(r.type)}</span><span>${r.confidence||0}%</span></div><p class="hint">${esc(r.reason||'')}</p><button class="btn gray" onclick="renderPage(${r.page})">このページを見る</button></div>`).join('')||'<p class="hint">未解析です。</p>'}function renderCands(){let el=$('cands');el.innerHTML=cands.map((c,i)=>`<div class="item"><div class="head"><span>P${c.page} ${esc(c.type)} ${esc(c.name||'')}</span><span>${c.confidence||0}%</span></div><div class="mini"><span>${esc(c.dia||c.main||'')}</span><span>@${esc(c.pitch||'')}</span><span>L/X ${esc(c.length||c.x||'')}</span><span>Y/本数 ${esc(c.y||c.qty||'')}</span></div><p class="hint">${esc(c.reason||'')}。確認して採用。</p><div class="grid"><button class="btn green" onclick="adopt(${i})">加工帳へ</button><button class="btn red" onclick="cands.splice(${i},1);renderCands()">捨てる</button></div></div>`).join('')||'<p class="hint">候補なし。</p>'}function split(len,d,stock=6000){if(!len)return[];if(len<=stock)return[len];let lap={D10:500,D13:600,D16:700}[d]||500,a=[],r=len;while(r>stock){a.push(stock);r-=stock-lap}a.push(Math.ceil(r));return a}function addRow(name,dia,cut,qty,note){split(+cut,dia).forEach((l,i)=>book.push({no:seq++,name:name+(i?`-${i+1}`:''),dia,cut:l,qty:+qty||1,note}));renderBook()}function adopt(i){let c=cands[i],t=String(c.type||''),d=c.dia||'D10';if(t.includes('土間')){let x=+c.x||+c.length||0,y=+c.y||0,p=+c.pitch||200;if(!x||!y){alert('寸法が足りません');return}addRow('土間X方向',d,x-120,(Math.floor((y-120)/p)+1)*2,'Vision候補');addRow('土間Y方向',d,y-120,(Math.floor((x-120)/p)+1)*2,'Vision候補')}else{addRow(c.name||c.type||'鉄筋',d,+c.length||+c.x||0,+c.qty||1,'Vision候補')}renderStats()}function renderBook(){let tb=$('rows');tb.innerHTML='';book.forEach(r=>{let w=(r.cut/1000)*r.qty*(unit[r.dia]||0);r.weight=w;tb.insertAdjacentHTML('beforeend',`<tr><td>${r.no}</td><td>${esc(r.name)}</td><td>${r.dia}</td><td>${r.cut}</td><td>${r.qty}</td><td>${w.toFixed(2)}</td><td>${esc(r.note)}</td></tr>`)})}function renderStats(){let kg=book.reduce((s,r)=>s+(r.weight||0),0),sub=kg*260;$('kg').textContent=kg.toFixed(1)+'kg';$('sub').textContent=Math.round(sub).toLocaleString()+'円';$('tax').textContent=Math.round(sub*1.1).toLocaleString()+'円'};</script></body></html>
